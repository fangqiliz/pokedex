<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pokédex Avanzada</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <button id="menuPokedex" class="menu-btn active">
                Pokédex
            </button>
            <button id="menuFavoritos" class="menu-btn">
                Favoritos
                <span id="favoritesCounter" class="favorites-counter">0</span>
            </button>
            <button id="menuComparar" class="menu-btn">Comparar</button>
        </nav>
    </header>

    <main>
        <!-- Sección Pokédex -->
        <section id="pokedexSection" class="active">
            <div class="controls">
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Buscar Pokémon por nombre o número">
                    <span class="search-icon">🔍</span>
                </div>
                <select id="typeFilter">
                    <option value="">Todos los tipos</option>
                    <option value="normal">Normal</option>
                    <option value="fire">Fuego</option>
                    <option value="water">Agua</option>
                    <option value="electric">Eléctrico</option>
                    <option value="grass">Planta</option>
                    <option value="ice">Hielo</option>
                    <option value="fighting">Lucha</option>
                    <option value="poison">Veneno</option>
                    <option value="ground">Tierra</option>
                    <option value="flying">Volador</option>
                    <option value="psychic">Psíquico</option>
                    <option value="bug">Bicho</option>
                    <option value="rock">Roca</option>
                    <option value="ghost">Fantasma</option>
                    <option value="dragon">Dragón</option>
                    <option value="dark">Siniestro</option>
                    <option value="steel">Acero</option>
                    <option value="fairy">Hada</option>
                </select>
                <select id="generationFilter">
                    <option value="">Todas las generaciones</option>
                    <option value="1">Generación 1</option>
                    <option value="2">Generación 2</option>
                    <option value="3">Generación 3</option>
                    <option value="4">Generación 4</option>
                    <option value="5">Generación 5</option>
                    <option value="6">Generación 6</option>
                    <option value="7">Generación 7</option>
                    <option value="8">Generación 8</option>
                    <option value="9">Generación 9</option>
                </select>
            </div>

            <!-- Historial de búsquedas -->
            <div id="searchHistoryContainer" class="search-history" style="display: none;">
                <h3>
                    Búsquedas recientes
                    <button id="clearHistoryBtn" class="clear-history-btn">Limpiar historial</button>
                </h3>
                <div id="historyItems" class="history-items"></div>
            </div>

            <div id="loader" class="loader hidden">⏳ Cargando Pokémon...</div>
            <div id="pokemonGrid"></div>

            <div id="paginationControls">
                <button id="prevPageBtn">Anterior</button>
                <span id="currentPageDisplay">Página 1</span>
                <button id="nextPageBtn">Siguiente</button>
            </div>
        </section>

        <!-- Sección Favoritos -->
        <section id="favoritosSection">
            <div class="favorites-header">
                <h2>Pokémon Favoritos</h2>
                <button id="clearFavoritesBtn" class="clear-favorites-btn" style="display: none;">
                    Limpiar favoritos
                </button>
            </div>
            <div id="favoritesGrid"></div>
            <div id="emptyFavorites" class="empty-state">
                <div>⭐</div>
                <h3>No tienes favoritos aún</h3>
                <p>Marca algunos Pokémon como favoritos para verlos aquí</p>
            </div>
        </section>

        <!-- Sección Comparar -->
        <section id="compararSection">
            <h2 style="text-align:center; margin-bottom: 2rem;">Comparar Pokémon</h2>
            <div style="display:flex; justify-content:center; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;">
                <select id="pokemonCompare1" class="compare-select">
                    <option value="">Seleccionar Pokémon 1</option>
                </select>
                <select id="pokemonCompare2" class="compare-select">
                    <option value="">Seleccionar Pokémon 2</option>
                </select>
            </div>
            <div style="text-align:center; margin-bottom: 2rem;">
                <button id="compareBtn" class="compare-btn">Comparar</button>
            </div>
        </section>

        <!-- Modal detalle Pokémon -->
        <div id="pokemonModal" class="modal">
            <div class="modal-content">
                <span id="closeModal" class="close">&times;</span>
                <div id="modalBody"></div>
            </div>
        </div>

        <!-- Modal comparación -->
        <div id="comparisonResult" class="modal">
            <div class="modal-content" style="max-width: 900px;">
                <span id="closeCompareModal" class="close">&times;</span>
                <div id="compareModalBody"></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
